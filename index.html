<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halaman Romantis</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: white;
}

header{
    text-align:center;
    padding:50px 20px;
}

header h1{
    font-size:3rem;
}

header p{
    margin-top:10px;
    font-size:1.2rem;
}

.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:60vh;
    text-align:center;
    padding:20px;
}

.card{
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding:30px;
    border-radius:20px;
    max-width:500px;
}

.card h2{
    margin-bottom:15px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:white;
    color:#ff5e78;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#ffe5ea;
}

footer{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
    <h1>❤️ hai cantikk ❤️</h1>
    <p>aku dari masa depan</p>
</header>

<section class="hero">
    <div class="card">
        <h2>Untuk Seseorang yang Spesial</h2>
        <h3>
            will you be my girlfriend?
        </h3>
        <a href="#" class="btn">Selalu Bersama</a>
    </div>
</section>

<footer>
    © 2026 - Dibuat dengan ❤️
</footer>

</body>
</html>
